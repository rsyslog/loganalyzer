name: Publish GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install -r doc-site/requirements.txt

      - name: Prepare docs
        run: python doc-site/prepare_docs.py
        env:
          GHP_REPO_URL: https://github.com/${{ github.repository }}
          GHP_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

      - name: Build site
        run: python -m mkdocs build -f doc-site/mkdocs.yml

      - uses: actions/upload-pages-artifact@v3
        with:
          path: doc-site/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
