name: PHP CI

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  php-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ["8.1", "8.2"]
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Fixture size cap (50MB)
        run: php tests/fixtures/check-size.php

      - name: PHP syntax check (all src PHP files)
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do
            php -l "$f"
          done < <(find src -name '*.php' -print0)

  phpunit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ["8.1", "8.2"]
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mysqli
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHPUnit
        run: vendor/bin/phpunit
