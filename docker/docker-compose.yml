# Default (consumer) stack: app baked into the image; config + DB persist in volumes.
# From repo root: docker compose --project-directory . -f docker/docker-compose.yml up --build
# Optional: copy `docker/env.example` → `.env` in the repo root to set admin and DB passwords.
# Clean reset: sh docker/rebuild-consumer.sh | docker\rebuild-consumer.bat

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-loganalyzer_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-loganalyzer}
      MYSQL_USER: ${MYSQL_USER:-loganalyzer}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-loganalyzer}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - loganalyzer_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - loganalyzer_config:/persist
      # Real host logs (Linux examples): uncomment and point LOGANALYZER_DISK_* at paths under /mnt/hostlog inside the container.
      # - /var/log:/mnt/hostlog:ro
    environment:
      LOGANALYZER_DOCROOT: /var/www/html
      LOGANALYZER_CONFIG_PATH: /persist/config.php
      LOGANALYZER_DB_HOST: db
      LOGANALYZER_DB_PORT: "3306"
      LOGANALYZER_DB_NAME: ${MYSQL_DATABASE:-loganalyzer}
      LOGANALYZER_DB_USER: ${MYSQL_USER:-loganalyzer}
      LOGANALYZER_DB_PASSWORD: ${MYSQL_PASSWORD:-loganalyzer}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-loganalyzer_root}
      LOGANALYZER_TABLE_PREFIX: logcon_
      LOGANALYZER_ADMIN_USER: ${LOGANALYZER_ADMIN_USER:-admin}
      LOGANALYZER_ADMIN_PASSWORD: ${LOGANALYZER_ADMIN_PASSWORD:-loganalyzer}
      LOGANALYZER_LOGIN_REQUIRED: "0"
      LOGANALYZER_SAMPLE_LOG: /samplelogs/sampledata_syslog.log
      LOGANALYZER_SAMPLE_EVENTREPORTER: /samplelogs/EventReporter.log
      LOGANALYZER_SEED_SAMPLE_SOURCES: "${LOGANALYZER_SEED_SAMPLE_SOURCES:-0}"
      LOGANALYZER_DISK_SOURCE_PATHS: "${LOGANALYZER_DISK_SOURCE_PATHS:-}"
      LOGANALYZER_DISK_SOURCES: "${LOGANALYZER_DISK_SOURCES:-}"
      LOGANALYZER_DISK_ALLOWED_EXTRA: "${LOGANALYZER_DISK_ALLOWED_EXTRA:-}"
      LOGANALYZER_OVERWRITE_CONFIG: "0"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          "exit(@file_get_contents('http://127.0.0.1:8080/index.php')!==false?0:1);",
        ]
      interval: 5s
      timeout: 8s
      retries: 30
      start_period: 45s

volumes:
  loganalyzer_mysql_data:
  loganalyzer_config:
